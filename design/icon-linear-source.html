<!doctype html>
<html>
<head><meta charset="utf-8"><style>body{margin:0;display:flex}svg{display:block}</style></head>
<body>
<!-- Linear · light -->
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="lsq"><rect width="512" height="512" rx="108"/></clipPath>
    <radialGradient id="lglow" cx="50%" cy="6%" r="72%">
      <stop offset="0%" stop-color="#5E6AD2" stop-opacity=".12"/><stop offset="100%" stop-color="#5E6AD2" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g clip-path="url(#lsq)">
    <rect width="512" height="512" fill="#FBFBFC"/>
    <rect width="512" height="512" fill="url(#lglow)"/>
    <rect x="10" y="10" width="492" height="492" rx="100" fill="none" stroke="#000000" stroke-opacity=".08" stroke-width="3"/>
    <!-- radar ring -->
    <circle cx="256" cy="256" r="128" fill="none" stroke="#5E6AD2" stroke-opacity=".26" stroke-width="7"/>
    <circle cx="256" cy="256" r="128" fill="none" stroke="#5E6AD2" stroke-width="7"
            stroke-linecap="round" stroke-dasharray="200 605" transform="rotate(-64 256 256)"/>
    <circle cx="368" cy="194" r="17" fill="#5E6AD2"/>
    <!-- IP -->
    <text x="256" y="306" text-anchor="middle" font-family="Inter,-apple-system,'Helvetica Neue',sans-serif"
          font-size="138" font-weight="800" letter-spacing="-4" fill="#1C1D21">IP</text>
  </g>
</svg>
<!-- Linear · dark -->
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="dsq"><rect width="512" height="512" rx="108"/></clipPath>
    <radialGradient id="dglow" cx="50%" cy="6%" r="72%">
      <stop offset="0%" stop-color="#7C7DFF" stop-opacity=".16"/><stop offset="100%" stop-color="#7C7DFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g clip-path="url(#dsq)">
    <rect width="512" height="512" fill="#0e0f11"/>
    <rect width="512" height="512" fill="url(#dglow)"/>
    <rect x="10" y="10" width="492" height="492" rx="100" fill="none" stroke="#ffffff" stroke-opacity=".10" stroke-width="3"/>
    <circle cx="256" cy="256" r="128" fill="none" stroke="#7C7DFF" stroke-opacity=".30" stroke-width="7"/>
    <circle cx="256" cy="256" r="128" fill="none" stroke="#7C7DFF" stroke-width="7"
            stroke-linecap="round" stroke-dasharray="200 605" transform="rotate(-64 256 256)"/>
    <circle cx="368" cy="194" r="17" fill="#7C7DFF"/>
    <text x="256" y="306" text-anchor="middle" font-family="Inter,-apple-system,'Helvetica Neue',sans-serif"
          font-size="138" font-weight="800" letter-spacing="-4" fill="#ECEEF1">IP</text>
  </g>
</svg>
</body>
</html>
